# kube-prometheus-stack Helm values for the kubestronaut-lab.
# Tuned for a local kind cluster (reduced replicas, no persistent storage).

fullnameOverride: kube-prometheus-stack

alertmanager:
  enabled: true
  alertmanagerSpec:
    replicas: 1
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi

grafana:
  enabled: true
  replicas: 1
  adminPassword: "${GRAFANA_ADMIN_PASSWORD}"  # set via .env.local — never commit real passwords
  service:
    type: NodePort
    nodePort: 30300
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki:3100
      access: proxy
      isDefault: false
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: ""
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default
  dashboards:
    default:
      kubernetes-cluster:
        gnetId: 7249
        revision: 1
        datasource: Prometheus
      node-exporter:
        gnetId: 1860
        revision: 37
        datasource: Prometheus
      argocd:
        gnetId: 14584
        revision: 1
        datasource: Prometheus
  sidecar:
    dashboards:
      enabled: true
  persistence:
    enabled: false

prometheus:
  prometheusSpec:
    replicas: 1
    retention: 7d
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
  service:
    type: NodePort
    nodePort: 30900

prometheusOperator:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
