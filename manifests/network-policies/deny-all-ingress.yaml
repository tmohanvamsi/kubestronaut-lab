# Default-deny all ingress traffic in the apps namespace.
# Pods are only reachable when an explicit NetworkPolicy allows traffic.
# Covers CKA/CKS domain: Network Policies.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-ingress
  namespace: apps
spec:
  podSelector: {}
  policyTypes:
    - Ingress
