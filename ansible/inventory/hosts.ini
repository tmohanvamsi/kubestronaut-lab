[local]
localhost ansible_connection=local ansible_python_interpreter=/usr/bin/python3

[remote]
# Add remote VMs here when going multi-cloud
# 10.0.0.10 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa
