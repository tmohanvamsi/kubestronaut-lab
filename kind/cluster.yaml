kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: kubestronaut

# Architecture (matches 16GB Mac, 8GB Docker Desktop budget):
#
#   control-plane  ~1.5GB  API server, etcd, Scheduler, CM, CoreDNS, Kyverno, cert-manager
#   worker-1       ~2.0GB  App workloads, ArgoCD, Istio sidecar, Helm releases   (CKAD + GitOps)
#   worker-2       ~2.5GB  Prometheus, Grafana, Loki, Promtail, Jaeger            (CKS + KCSA)
#   Docker overhead ~1.0GB
#   ─────────────────────
#   Total           ~7.0GB of 8GB allocated → 8GB left for macOS + VS Code

nodes:
  # ── control-plane ─────────────────────────────────────────────────────────
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true,role=control-plane"
    extraPortMappings:
      # nginx ingress HTTP
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      # nginx ingress HTTPS
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      # ArgoCD UI (NodePort)
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
      # Grafana (NodePort)
      - containerPort: 30300
        hostPort: 3000
        protocol: TCP
      # Prometheus (NodePort)
      - containerPort: 30900
        hostPort: 9090
        protocol: TCP
      # Jaeger UI (NodePort)
      - containerPort: 30686
        hostPort: 16686
        protocol: TCP

  # ── worker-1: apps + GitOps ───────────────────────────────────────────────
  # Labels applied post-creation: make cluster-create labels nodes automatically
  - role: worker

  # ── worker-2: observability ────────────────────────────────────────────────
  - role: worker

networking:
  apiServerAddress: "127.0.0.1"
  apiServerPort: 6443
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/16"
  disableDefaultCNI: false
